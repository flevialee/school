<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>現金計算機</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    table {
      border-collapse: collapse;
      width: 300px;
    }
    td, th {
      border: 1px solid #333;
      padding: 8px;
      text-align: center;
    }
    input {
      width: 60px;
    }
    .total {
      margin-top: 15px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>現金計算機</h2>

<table>
  <tr>
    <th>面額</th>
    <th>張數</th>
    <th>小計</th>
  </tr>

  <tr>
    <td>1 元</td>
    <td><input type="number" min="0" value="0" oninput="calculateTotal()"></td>
    <td class="subtotal">0</td>
  </tr>

  <tr>
    <td>5 元</td>
    <td><input type="number" min="0" value="0" oninput="calculateTotal()"></td>
    <td class="subtotal">0</td>
  </tr>

  <tr>
    <td>10 元</td>
    <td><input type="number" min="0" value="0" oninput="calculateTotal()"></td>
    <td class="subtotal">0</td>
  </tr>

  <!-- ⭐ 新增的 50 元 -->
  <tr>
    <td>50 元</td>
    <td><input type="number" min="0" value="0" oninput="calculateTotal()"></td>
    <td class="subtotal">0</td>
  </tr>

  <tr>
    <td>100 元</td>
    <td><input type="number" min="0" value="0" oninput="calculateTotal()"></td>
    <td class="subtotal">0</td>
  </tr>

  <tr>
    <td>500 元</td>
    <td><input type="number" min="0" value="0" oninput="calculateTotal()"></td>
    <td class="subtotal">0</td>
  </tr>

  <tr>
    <td>1000 元</td>
    <td><input type="number" min="0" value="0" oninput="calculateTotal()"></td>
    <td class="subtotal">0</td>
  </tr>

</table>

<div class="total">總金額：<span id="total">0</span> 元</div>

<script>
function calculateTotal() {
  const rows = document.querySelectorAll("table tr");
  let total = 0;

  const values = [1, 5, 10, 50, 100, 500, 1000];

  for (let i = 1; i < rows.length; i++) {
    const input = rows[i].querySelector("input");
    const subtotalCell = rows[i].querySelector(".subtotal");

    if (!input) continue;

    const count = parseInt(input.value) || 0;
    const subtotal = count * values[i - 1];

    subtotalCell.textContent = subtotal;
    total += subtotal;
  }

  document.getElementById("total").textContent = total;
}
</script>

</body>
</html>
